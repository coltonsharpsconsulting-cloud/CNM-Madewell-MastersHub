<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ruby's Big Delivery — A Red Blood Cell's Journey</title>
<meta name="description" content="A digital story: follow Ruby the red blood cell on her journey through the human body." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --display:"Fraunces", Georgia, "Times New Roman", serif;
    --body:"Nunito", ui-rounded, "Segoe UI", system-ui, sans-serif;
    --bg0:#16040c; --bg1:#360a1a; --bg2:#601533;
    --blood:#e23e57; --blood-deep:#7d1228;
    --ox:#2fe6d6; --ox-glow:#7ffcef;
    --co2:#9a86d6; --co2-deep:#5b4b8a;
    --cream:#fbf0e2; --parch:#fff7ec; --ink:#3a1418; --ink-soft:#6a3b34;
    --gold:#f4b43f;
    --rbc:#8d6fc0; --aura:#b9a3e0;            /* default low-oxygen Ruby */
    --beat:1000ms;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:var(--body); color:var(--cream);
    background:
      radial-gradient(120% 90% at 70% 12%, rgba(226,62,87,.30), transparent 55%),
      radial-gradient(110% 120% at 20% 100%, rgba(47,230,214,.10), transparent 55%),
      linear-gradient(160deg, var(--bg0) 0%, var(--bg1) 48%, var(--bg2) 100%);
    background-attachment:fixed;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* film grain + vignette overlays */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.06; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:59;
    background:radial-gradient(130% 110% at 50% 42%, transparent 52%, rgba(8,1,5,.55) 100%);
  }

  .stage-wrap{position:relative; height:100%; display:flex; flex-direction:column;}

  /* ---------- header ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between; gap:1rem;
    padding:clamp(.7rem,2vw,1.3rem) clamp(1rem,3vw,2.4rem); z-index:20;
  }
  .brand{display:flex; align-items:center; gap:.6rem; letter-spacing:.02em}
  .brand .mark{
    width:30px;height:30px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--ox-glow), var(--ox) 45%, #0e7d77 100%);
    box-shadow:0 0 0 3px rgba(255,255,255,.08), 0 0 18px rgba(47,230,214,.5);
    flex:none;
  }
  .brand b{font-family:var(--display); font-weight:700; font-size:1.02rem}
  .brand span{font-size:.74rem; opacity:.62; display:block; margin-top:-2px; font-weight:600}
  .progress{display:flex; gap:.5rem; align-items:center}
  .dot{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(255,255,255,.35); background:transparent; transition:.4s; cursor:pointer}
  .dot.done{background:rgba(255,255,255,.35)}
  .dot.active{background:var(--ox); border-color:var(--ox); box-shadow:0 0 14px var(--ox); transform:scale(1.25)}

  /* ---------- stage ---------- */
  main{flex:1; position:relative; min-height:0}
  .scene-svg{
    position:absolute; inset:0; width:100%; height:100%;
    animation:beat var(--beat) ease-in-out infinite;
  }
  @keyframes beat{0%,100%{transform:scale(1)} 8%{transform:scale(1.012)} 18%{transform:scale(1.004)} 30%{transform:scale(1.016)} 42%{transform:scale(1)}}

  .scene{opacity:0; visibility:hidden; transition:opacity .7s ease}
  .scene.is-active{opacity:1; visibility:visible}
  .scene.s-ox-high{--rbc:#f0405f; --aura:#ff7d90}
  .scene.s-ox-low{--rbc:#8d6fc0; --aura:#b9a3e0}

  .rbc-body{fill:var(--rbc); transition:fill 1.1s ease; filter:drop-shadow(0 6px 14px rgba(0,0,0,.35))}
  .rbc-aura{fill:var(--aura); opacity:.25; transition:fill 1.1s ease}
  .drift{animation:drift 7s ease-in-out infinite}
  .drift2{animation:drift 9s ease-in-out infinite reverse}
  .drift3{animation:drift 11s ease-in-out infinite}
  @keyframes drift{0%,100%{transform:translate(0,0)}25%{transform:translate(14px,-12px)}50%{transform:translate(-8px,10px)}75%{transform:translate(10px,8px)}}
  .floaty{animation:floaty 4.5s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .breathe{transform-box:fill-box; transform-origin:center; animation:breathe 4s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .spin{transform-box:fill-box; transform-origin:center; animation:spin 22s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .dash{stroke-dasharray:7 12; animation:dash 1.2s linear infinite}
  @keyframes dash{to{stroke-dashoffset:-38}}
  .rush{animation:rush 2.4s ease-in-out infinite}
  @keyframes rush{0%{transform:translateX(-30px);opacity:0}20%{opacity:1}100%{transform:translateX(120px);opacity:0}}

  /* ---------- caption ---------- */
  .caption-zone{
    position:absolute; left:0; right:0; bottom:0; z-index:15;
    padding:0 clamp(1rem,3vw,2.4rem) clamp(1rem,2.5vw,1.6rem);
    display:flex; justify-content:center; pointer-events:none;
  }
  .caption{
    pointer-events:auto; width:min(720px, 100%);
    background:linear-gradient(180deg, var(--parch), var(--cream));
    color:var(--ink); border-radius:18px;
    padding:clamp(1rem,2.6vw,1.6rem) clamp(1.1rem,3vw,2rem);
    box-shadow:0 24px 50px -18px rgba(0,0,0,.6), inset 0 0 0 1px rgba(122,32,40,.10);
    position:relative; transform:translateY(0); opacity:1; transition:opacity .5s, transform .5s;
  }
  .caption::before{ /* torn-edge accent */
    content:""; position:absolute; left:18px; right:18px; top:-7px; height:7px;
    background:repeating-linear-gradient(90deg, var(--gold) 0 14px, transparent 14px 26px); opacity:.5; border-radius:4px;
  }
  .caption .kicker{
    font-family:var(--body); font-weight:800; text-transform:uppercase; letter-spacing:.18em;
    font-size:.7rem; color:var(--blood); margin:0 0 .25rem;
  }
  .caption h2{
    font-family:var(--display); font-weight:900; font-size:clamp(1.5rem,4.4vw,2.3rem);
    line-height:1.02; margin:.1rem 0 .55rem; color:var(--ink); font-optical-sizing:auto;
  }
  .caption h2 em{font-style:italic; color:var(--blood)}
  .caption p{margin:0; font-size:clamp(.98rem,2.2vw,1.12rem); line-height:1.5; font-weight:500}
  .sci{
    margin-top:.85rem; display:flex; gap:.7rem; align-items:flex-start;
    background:rgba(47,230,214,.12); border-left:4px solid var(--ox-deep,#16b3a6);
    border-radius:0 12px 12px 0; padding:.6rem .85rem; font-size:.86rem; color:var(--ink-soft);
  }
  .sci b{color:#0c7f78; font-weight:800; font-family:var(--body); letter-spacing:.02em}
  .sci .tag{
    flex:none; font-size:.62rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
    background:#0c7f78; color:#eafffb; padding:.2rem .45rem; border-radius:6px; margin-top:.1rem;
  }

  /* ---------- controls ---------- */
  .controls{
    z-index:20; display:flex; align-items:center; justify-content:center; gap:.6rem; flex-wrap:wrap;
    padding:clamp(.7rem,2vw,1.1rem) 1rem calc(clamp(.7rem,2vw,1.1rem) + env(safe-area-inset-bottom,0px));
  }
  button.ui{
    font-family:var(--body); font-weight:800; font-size:.92rem; color:var(--cream);
    background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.18);
    padding:.62rem 1.05rem; border-radius:999px; cursor:pointer; transition:.2s;
    display:inline-flex; align-items:center; gap:.45rem; backdrop-filter:none;
  }
  button.ui:hover{background:rgba(255,255,255,.14); transform:translateY(-2px)}
  button.ui:active{transform:translateY(0)}
  button.ui:disabled{opacity:.32; cursor:not-allowed; transform:none}
  button.primary{
    background:linear-gradient(180deg, var(--ox-glow), var(--ox)); color:#063b37; border-color:transparent;
    box-shadow:0 10px 26px -8px rgba(47,230,214,.6);
  }
  button.primary:hover{background:linear-gradient(180deg,#9dfff2,var(--ox-glow))}
  .counter{font-weight:800; font-size:.85rem; opacity:.75; min-width:74px; text-align:center; letter-spacing:.04em}

  /* oxygen meter */
  .o2{display:flex; align-items:center; gap:.5rem; padding:.35rem .7rem; border-radius:999px;
      background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.12)}
  .o2 .lab{font-size:.62rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; opacity:.8}
  .o2 .track{width:96px; height:9px; border-radius:999px; background:rgba(255,255,255,.14); overflow:hidden}
  .o2 .fill{height:100%; width:18%; border-radius:999px; transition:width 1.1s ease, background 1.1s ease;
            background:linear-gradient(90deg,var(--ox),var(--ox-glow)); box-shadow:0 0 12px var(--ox)}

  /* ---------- cover ---------- */
  .cover{
    position:absolute; inset:0; z-index:40; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:1.1rem;
    padding:2rem; transition:opacity .8s ease, visibility .8s;
    background:
      radial-gradient(120% 90% at 50% 28%, rgba(226,62,87,.30), transparent 58%),
      radial-gradient(100% 90% at 80% 90%, rgba(47,230,214,.10), transparent 55%),
      linear-gradient(160deg, var(--bg0) 0%, var(--bg1) 48%, var(--bg2) 100%);
  }
  .cover.hide{opacity:0; visibility:hidden}
  .cover .eyebrow{font-weight:800; letter-spacing:.32em; text-transform:uppercase; font-size:.72rem; color:var(--ox); opacity:.9}
  .cover h1{
    font-family:var(--display); font-weight:900; line-height:.92; margin:.2rem 0;
    font-size:clamp(2.8rem,9vw,6rem); text-shadow:0 14px 40px rgba(0,0,0,.5);
  }
  .cover h1 em{font-style:italic; color:var(--blood); display:block}
  .cover .sub{font-family:var(--display); font-style:italic; font-weight:500; font-size:clamp(1.1rem,3vw,1.6rem); opacity:.92}
  .cover .byline{font-size:.82rem; opacity:.6; font-weight:700; letter-spacing:.04em; margin-top:.2rem}
  .cover .hero{width:min(230px,46vw); margin:.4rem auto; animation:floaty 5s ease-in-out infinite}
  .cover .hint{font-size:.74rem; opacity:.5; margin-top:.4rem}

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    .scene-svg,.drift,.drift2,.drift3,.floaty,.breathe,.spin,.dash,.rush,.cover .hero{animation:none !important}
  }
  @media (max-width:560px){
    .brand span{display:none}
    .o2 .track{width:64px}
    .counter{min-width:60px}
  }
</style>
</head>
<body>
<div class="stage-wrap">

  <header>
    <div class="brand">
      <span class="mark" aria-hidden="true"></span>
      <div><b>Ruby's Big Delivery</b><span>Mrs. Madewell · Life Science</span></div>
    </div>
    <nav class="progress" id="dots" aria-label="Scene progress"></nav>
  </header>

  <main>
    <!-- ============ STAGE SVG ============ -->
    <svg class="scene-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <defs>
        <radialGradient id="plasma" cx="50%" cy="40%" r="70%">
          <stop offset="0%" stop-color="#ff6b81" stop-opacity=".22"/>
          <stop offset="60%" stop-color="#7d1228" stop-opacity=".05"/>
          <stop offset="100%" stop-color="#16040c" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="rbcShade" cx="38%" cy="32%" r="75%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity=".55"/>
          <stop offset="38%" stop-color="#ffffff" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000000" stop-opacity=".28"/>
        </radialGradient>
        <!-- Ruby the red blood cell: biconcave disc with a friendly face -->
        <symbol id="rbc" viewBox="-60 -42 120 84">
          <ellipse class="rbc-aura" cx="0" cy="0" rx="58" ry="40"/>
          <ellipse class="rbc-body" cx="0" cy="0" rx="50" ry="33"/>
          <ellipse cx="0" cy="0" rx="50" ry="33" fill="url(#rbcShade)"/>
          <ellipse cx="0" cy="2" rx="22" ry="13" fill="#000" opacity=".14"/>
          <g class="rbc-face">
            <circle cx="-15" cy="-4" r="5.4" fill="#fff"/>
            <circle cx="15" cy="-4" r="5.4" fill="#fff"/>
            <circle cx="-13.6" cy="-3" r="2.7" fill="#2a0b12"/>
            <circle cx="16.4" cy="-3" r="2.7" fill="#2a0b12"/>
            <path d="M-12 9 Q0 19 12 9" fill="none" stroke="#2a0b12" stroke-width="3.2" stroke-linecap="round"/>
            <circle cx="-26" cy="6" r="5" fill="#fff" opacity=".18"/>
            <circle cx="26" cy="6" r="5" fill="#fff" opacity=".18"/>
          </g>
        </symbol>
        <!-- plain background cell -->
        <symbol id="cell" viewBox="-60 -42 120 84">
          <ellipse cx="0" cy="0" rx="50" ry="33" fill="#c2283b" opacity=".5"/>
          <ellipse cx="0" cy="0" rx="50" ry="33" fill="url(#rbcShade)" opacity=".7"/>
          <ellipse cx="0" cy="1" rx="20" ry="12" fill="#000" opacity=".12"/>
        </symbol>
        <!-- oxygen molecule (O2) -->
        <symbol id="o2" viewBox="-16 -10 32 20">
          <circle cx="-6" cy="0" r="8" fill="#2fe6d6"/><circle cx="6" cy="0" r="8" fill="#2fe6d6"/>
          <circle cx="-8" cy="-2" r="2.4" fill="#dffffb"/><circle cx="4" cy="-2" r="2.4" fill="#dffffb"/>
        </symbol>
        <!-- carbon dioxide (CO2) -->
        <symbol id="co2" viewBox="-22 -10 44 20">
          <circle cx="0" cy="0" r="8.5" fill="#5b4b8a"/>
          <circle cx="-12" cy="0" r="6.5" fill="#9a86d6"/><circle cx="12" cy="0" r="6.5" fill="#9a86d6"/>
        </symbol>
      </defs>

      <rect x="0" y="0" width="1000" height="600" fill="url(#plasma)"/>
      <!-- ambient drifting cells (persist across scenes) -->
      <g opacity=".5">
        <use href="#cell" x="80" y="90" width="120" height="84" class="drift"/>
        <use href="#cell" x="820" y="120" width="96" height="68" class="drift2"/>
        <use href="#cell" x="120" y="430" width="104" height="74" class="drift3"/>
        <use href="#cell" x="840" y="440" width="120" height="84" class="drift"/>
        <use href="#cell" x="470" y="40" width="80" height="56" class="drift2"/>
      </g>

      <!-- ============ SCENE 1 · RIGHT HEART ============ -->
      <g class="scene s-ox-low" data-scene="1">
        <g class="breathe">
          <path d="M500 150 C 560 110, 690 130, 690 250 C 690 360, 560 430, 500 470
                   C 440 430, 310 360, 310 250 C 310 130, 440 110, 500 150 Z"
                fill="#a01633" opacity=".55" stroke="#e23e57" stroke-width="6"/>
          <path d="M500 200 C 540 175, 620 188, 620 258 C 620 330, 540 372, 500 398
                   C 470 372, 392 330, 392 258 C 392 188, 470 178, 500 200 Z"
                fill="#7d1228" opacity=".6"/>
        </g>
        <text x="500" y="120" text-anchor="middle" fill="#ffd9df" font-family="Nunito,sans-serif" font-weight="800" font-size="20" opacity=".8">RIGHT SIDE OF THE HEART</text>
        <use href="#co2" x="360" y="300" width="44" height="20" class="floaty"/>
        <use href="#co2" x="600" y="210" width="44" height="20" class="floaty" style="animation-delay:-1.5s"/>
        <use href="#co2" x="560" y="250" width="44" height="20" class="floaty" style="animation-delay:-2.6s"/>
        <use href="#rbc" x="430" y="150" width="140" height="98" class="floaty"/>
      </g>

      <!-- ============ SCENE 2 · LUNGS ============ -->
      <g class="scene s-ox-high" data-scene="2">
        <g class="breathe" opacity=".9">
          <circle cx="300" cy="250" r="70" fill="#2fe6d6" opacity=".12" stroke="#7ffcef" stroke-width="3"/>
          <circle cx="250" cy="360" r="55" fill="#2fe6d6" opacity=".12" stroke="#7ffcef" stroke-width="3"/>
          <circle cx="370" cy="370" r="48" fill="#2fe6d6" opacity=".12" stroke="#7ffcef" stroke-width="3"/>
          <circle cx="360" cy="170" r="44" fill="#2fe6d6" opacity=".12" stroke="#7ffcef" stroke-width="3"/>
          <circle cx="700" cy="250" r="70" fill="#2fe6d6" opacity=".12" stroke="#7ffcef" stroke-width="3"/>
          <circle cx="750" cy="360" r="55" fill="#2fe6d6" opacity=".12" stroke="#7ffcef" stroke-width="3"/>
          <circle cx="640" cy="360" r="46" fill="#2fe6d6" opacity=".12" stroke="#7ffcef" stroke-width="3"/>
        </g>
        <text x="500" y="110" text-anchor="middle" fill="#cafff8" font-family="Nunito,sans-serif" font-weight="800" font-size="20" opacity=".85">THE ALVEOLI (TINY AIR SACS)</text>
        <use href="#o2" x="430" y="150" width="40" height="25" class="floaty"/>
        <use href="#o2" x="540" y="180" width="40" height="25" class="floaty" style="animation-delay:-1.2s"/>
        <use href="#o2" x="470" y="430" width="40" height="25" class="floaty" style="animation-delay:-2.1s"/>
        <use href="#o2" x="560" y="410" width="40" height="25" class="floaty" style="animation-delay:-.6s"/>
        <use href="#rbc" x="430" y="155" width="150" height="105" class="floaty"/>
      </g>

      <!-- ============ SCENE 3 · LEFT HEART / AORTA ============ -->
      <g class="scene s-ox-high" data-scene="3">
        <path d="M470 470 C 430 360, 430 250, 520 220 C 470 300, 520 360, 560 300
                 C 640 180, 760 150, 820 90" fill="none" stroke="#e23e57" stroke-width="46"
              stroke-linecap="round" opacity=".5"/>
        <path d="M470 470 C 430 360, 430 250, 520 220 C 470 300, 520 360, 560 300
                 C 640 180, 760 150, 820 90" fill="none" stroke="#ff8497" stroke-width="10"
              stroke-linecap="round" class="dash"/>
        <g class="breathe">
          <path d="M300 250 C 340 200, 440 210, 440 300 C 440 400, 340 440, 300 470
                   C 270 440, 190 400, 190 300 C 190 210, 270 200, 300 250 Z"
                fill="#a01633" opacity=".7" stroke="#e23e57" stroke-width="8"/>
        </g>
        <text x="300" y="148" text-anchor="middle" fill="#ffd9df" font-family="Nunito,sans-serif" font-weight="800" font-size="19" opacity=".85">LEFT VENTRICLE</text>
        <text x="788" y="70" text-anchor="middle" fill="#ffd9df" font-family="Nunito,sans-serif" font-weight="800" font-size="17" opacity=".8">→ AORTA</text>
        <g class="rush"><use href="#o2" x="540" y="250" width="34" height="21"/></g>
        <use href="#rbc" x="250" y="185" width="120" height="84" class="floaty"/>
      </g>

      <!-- ============ SCENE 4 · ARTERIES → CAPILLARIES ============ -->
      <g class="scene s-ox-high" data-scene="4">
        <path d="M40 300 H 360" stroke="#e23e57" stroke-width="40" fill="none" stroke-linecap="round" opacity=".5"/>
        <path d="M360 300 C 470 300, 470 190, 600 190" stroke="#e23e57" stroke-width="26" fill="none" stroke-linecap="round" opacity=".5"/>
        <path d="M360 300 C 470 300, 470 410, 600 410" stroke="#e23e57" stroke-width="26" fill="none" stroke-linecap="round" opacity=".5"/>
        <path d="M600 190 C 720 190, 720 140, 880 140" stroke="#e23e57" stroke-width="13" fill="none" stroke-linecap="round" opacity=".5"/>
        <path d="M600 190 C 720 190, 720 250, 880 250" stroke="#e23e57" stroke-width="13" fill="none" stroke-linecap="round" opacity=".5"/>
        <path d="M600 410 C 720 410, 720 350, 880 350" stroke="#e23e57" stroke-width="9" fill="none" stroke-linecap="round" opacity=".5"/>
        <path d="M600 410 C 720 410, 720 470, 880 470" stroke="#e23e57" stroke-width="9" fill="none" stroke-linecap="round" opacity=".5"/>
        <path d="M40 300 H 360 M360 300 C 470 300, 470 190, 600 190" stroke="#ff8497" stroke-width="6" fill="none" stroke-linecap="round" class="dash"/>
        <text x="180" y="128" text-anchor="middle" fill="#ffd9df" font-family="Nunito,sans-serif" font-weight="800" font-size="18" opacity=".8">ARTERIES → CAPILLARIES</text>
        <text x="820" y="120" text-anchor="middle" fill="#ffd9df" font-family="Nunito,sans-serif" font-weight="800" font-size="15" opacity=".75">capillaries</text>
        <use href="#rbc" x="120" y="150" width="92" height="64" class="rush"/>
        <use href="#rbc" x="40" y="160" width="84" height="58" class="floaty"/>
      </g>

      <!-- ============ SCENE 5 · CAPILLARY AT A MUSCLE ============ -->
      <g class="scene s-ox-low" data-scene="5">
        <g opacity=".55" stroke="#b8324a" fill="none" stroke-width="14" stroke-linecap="round">
          <path d="M120 120 q 380 -30 760 0" class="floaty"/>
          <path d="M120 180 q 380 30 760 0" class="floaty" style="animation-delay:-1s"/>
          <path d="M120 430 q 380 -30 760 0" class="floaty" style="animation-delay:-2s"/>
          <path d="M120 490 q 380 30 760 0" class="floaty" style="animation-delay:-1.5s"/>
        </g>
        <text x="500" y="95" text-anchor="middle" fill="#ffd9df" font-family="Nunito,sans-serif" font-weight="800" font-size="19" opacity=".8">A HARD-WORKING MUSCLE</text>
        <path d="M60 235 H 940" stroke="#e8607a" stroke-width="34" fill="none" stroke-linecap="round" opacity=".4"/>
        <path d="M60 235 H 940" stroke="#ffd0d8" stroke-width="4" fill="none" stroke-linecap="round" class="dash" opacity=".7"/>
        <!-- O2 leaving to muscle, CO2 coming in -->
        <use href="#o2" x="470" y="150" width="34" height="21" class="floaty"/>
        <use href="#o2" x="540" y="300" width="34" height="21" class="floaty" style="animation-delay:-1.3s"/>
        <use href="#co2" x="360" y="300" width="40" height="18" class="floaty" style="animation-delay:-.7s"/>
        <use href="#co2" x="600" y="150" width="40" height="18" class="floaty" style="animation-delay:-2s"/>
        <use href="#rbc" x="440" y="195" width="120" height="84" class="floaty"/>
      </g>

      <!-- ============ SCENE 6 · VEINS HOME ============ -->
      <g class="scene s-ox-low" data-scene="6">
        <path d="M860 80 C 760 200, 720 360, 520 380 C 360 396, 260 470, 150 520"
              fill="none" stroke="#6a4b86" stroke-width="44" stroke-linecap="round" opacity=".5"/>
        <path d="M860 80 C 760 200, 720 360, 520 380 C 360 396, 260 470, 150 520"
              fill="none" stroke="#b9a3e0" stroke-width="8" stroke-linecap="round" class="dash" opacity=".8"/>
        <!-- valve chevrons -->
        <g stroke="#d9ccf2" stroke-width="5" fill="none" opacity=".7" stroke-linecap="round">
          <path d="M735 205 l 26 14 l -26 14"/>
          <path d="M610 330 l 26 14 l -26 14"/>
          <path d="M420 392 l 26 14 l -26 14"/>
        </g>
        <text x="700" y="140" text-anchor="middle" fill="#e9defb" font-family="Nunito,sans-serif" font-weight="800" font-size="18" opacity=".8">VEINS (with valves) → HOME</text>
        <use href="#rbc" x="780" y="60" width="120" height="84" class="floaty"/>
        <!-- loop arrow back to start -->
        <path d="M150 520 q -70 -40 -40 -120" fill="none" stroke="#f4b43f" stroke-width="4" stroke-dasharray="6 8" opacity=".7"/>
        <path d="M110 400 l -8 18 l 18 -4 z" fill="#f4b43f" opacity=".8"/>
      </g>
    </svg>

    <!-- ============ CAPTION ============ -->
    <div class="caption-zone">
      <article class="caption" id="caption" aria-live="polite">
        <p class="kicker" id="kicker">Scene 1 · The Right Heart</p>
        <h2 id="title">Tired and Blue</h2>
        <p id="story"></p>
        <div class="sci"><span class="tag">Science</span><span id="sci"></span></div>
      </article>
    </div>
  </main>

  <!-- ============ CONTROLS ============ -->
  <div class="controls">
    <button class="ui" id="prev" aria-label="Previous scene">‹ Back</button>
    <span class="counter" id="counter">1 / 6</span>
    <button class="ui primary" id="next" aria-label="Next scene">Next ›</button>
    <button class="ui" id="narrate" aria-label="Read this scene aloud">🔊 Narrate</button>
    <button class="ui" id="sound" aria-pressed="true" aria-label="Toggle sound">♪ Sound: On</button>
    <span class="o2" title="Ruby's oxygen level"><span class="lab">O₂</span><span class="track"><span class="fill" id="o2fill"></span></span></span>
  </div>

  <!-- ============ COVER ============ -->
  <div class="cover" id="cover">
    <p class="eyebrow">A Digital Story</p>
    <svg class="hero" viewBox="-70 -50 140 100" aria-hidden="true">
      <use href="#rbc" x="-60" y="-42" width="120" height="84" style="--rbc:#f0405f;--aura:#ff7d90"/>
    </svg>
    <h1>Ruby's<em>Big Delivery</em></h1>
    <p class="sub">A red blood cell's journey through the body</p>
    <p class="byline">Mrs. Madewell · 7th-Grade Life Science</p>
    <button class="ui primary" id="start" style="font-size:1.05rem; padding:.8rem 1.6rem; margin-top:.6rem">Begin the Journey ▶</button>
    <p class="hint">Best with sound on · use ‹ › or arrow keys to turn the pages</p>
  </div>

</div>

<script>
(function(){
  "use strict";
  var SCENES = [
    { kicker:"Scene 1 · The Right Heart", title:"Tired and Blue",
      story:"Meet Ruby. She's a red blood cell — but right now she doesn't feel very red. She has just finished dropping oxygen off all over the body, and she's lugging a heavy load of carbon dioxide, the waste gas your cells breathe out. Dusky and violet-blue, she waits in the right side of the heart. THUMP-THUMP! The heart squeezes, and Ruby is off to the lungs.",
      sci:"The right side of the heart pumps oxygen-poor blood to the lungs. Blood low on oxygen looks dark and bluish — that's why your veins look blue through your skin.",
      o2:16 },
    { kicker:"Scene 2 · The Lungs", title:"The Big Breath",
      story:"Ruby tumbles into the lungs, into millions of tiny air sacs called alveoli. This is the great trade! She lets go of her carbon dioxide — whoosh, you breathe it out — and grabs fresh oxygen from the air you just breathed in. Watch her change: dull violet blooms into a brilliant, glowing red. Ruby feels brand new.",
      sci:"Gas exchange happens in the alveoli. Oxygen attaches to a protein in red blood cells called hemoglobin, which glows bright red when it's carrying oxygen.",
      o2:100 },
    { kicker:"Scene 3 · The Left Heart", title:"The Power Pump",
      story:"Bright with oxygen, Ruby rushes back to the heart — this time the left side. The left ventricle is the strongest muscle in the heart, and it's about to show off. It SQUEEZES with all its might… and launches Ruby out through the aorta, the body's biggest artery, like a surfer catching the perfect wave.",
      sci:"The left ventricle pumps oxygen-rich blood to the whole body, so it has the thickest, most muscular wall. Your heart beats about 100,000 times a day to keep blood moving.",
      o2:100 },
    { kicker:"Scene 4 · The Arteries", title:"The Highway",
      story:"Ruby races down the arterial highway. The wide aorta branches into smaller arteries, then smaller arterioles, then the tiniest roads of all: capillaries — so narrow that red blood cells must travel single file, one… by… one. Ruby slows down and lines up.",
      sci:"Blood vessels branch like a tree: arteries → arterioles → capillaries. Capillaries are only one cell thick, which lets oxygen slip right through their walls.",
      o2:92 },
    { kicker:"Scene 5 · The Capillaries", title:"Special Delivery",
      story:"Ruby reaches a hard-working leg muscle that's been running and is hungry for oxygen. Through the thin capillary wall she makes her delivery — oxygen out to the muscle cells, which burn it for energy. In return she picks up their carbon-dioxide waste. Slowly, Ruby fades back to dusky violet. Delivery complete.",
      sci:"Cells use oxygen for cellular respiration — turning food into usable energy — and give off carbon dioxide as waste. Ruby trades O₂ for CO₂ right at the capillaries.",
      o2:18 },
    { kicker:"Scene 6 · The Veins", title:"The Long Way Home",
      story:"Carrying her load of carbon dioxide, Ruby drifts into the veins for the trip home. Veins have little one-way doors called valves that stop blood from sliding backward. Gently, she floats all the way back to the right side of the heart — right where we began. Ready? THUMP-THUMP. Off she goes again! Ruby makes this whole loop about once a minute, for around 120 days. What a courier.",
      sci:"Veins return oxygen-poor blood to the heart and use valves to keep it moving one way. A red blood cell lives about 120 days — and you have around 25 trillion of them!",
      o2:16 }
  ];
  var TOTAL = SCENES.length;
  var cur = 1, soundOn = true, started = false;

  var $ = function(id){ return document.getElementById(id); };
  var figures = Array.prototype.slice.call(document.querySelectorAll('.scene'));
  var dotsWrap = $('dots');
  for (var i=1;i<=TOTAL;i++){
    var d = document.createElement('button');
    d.className='dot'; d.setAttribute('aria-label','Go to scene '+i); d.dataset.n=i;
    d.addEventListener('click', (function(n){return function(){ go(n); };})(i));
    dotsWrap.appendChild(d);
  }
  var dots = Array.prototype.slice.call(dotsWrap.children);

  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------- Web Audio ---------- */
  var actx=null, noiseBuf=null, beatTimer=null;
  function initAudio(){
    if (actx) return;
    try{
      var AC = window.AudioContext || window.webkitAudioContext;
      actx = new AC();
      var len = actx.sampleRate * 1.2;
      noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
      var data = noiseBuf.getChannelData(0);
      for (var i=0;i<len;i++) data[i] = Math.random()*2-1;
    }catch(e){ actx=null; }
  }
  function thump(t0, freq, gainPeak){
    if(!actx) return;
    var o = actx.createOscillator(), g = actx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(freq||60, t0);
    o.frequency.exponentialRampToValueAtTime((freq||60)*0.6, t0+0.18);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gainPeak||0.6, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+0.22);
    o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0+0.26);
  }
  function heartbeat(){
    if(!actx||!soundOn) return;
    var t = actx.currentTime;
    thump(t, 62, 0.5); thump(t+0.22, 48, 0.34);
  }
  function noiseBurst(dur, type, f, q, peak){
    if(!actx||!soundOn) return;
    var src = actx.createBufferSource(); src.buffer = noiseBuf; src.loop=true;
    var filt = actx.createBiquadFilter(); filt.type=type||'lowpass'; filt.frequency.value=f||800; filt.Q.value=q||1;
    var g = actx.createGain(); var t=actx.currentTime;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(peak||0.18, t+dur*0.3);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    src.connect(filt).connect(g).connect(actx.destination); src.start(t); src.stop(t+dur+0.05);
  }
  function sparkle(){
    if(!actx||!soundOn) return;
    var t=actx.currentTime;
    [880,1320,1760].forEach(function(f,k){
      var o=actx.createOscillator(), g=actx.createGain();
      o.type='triangle'; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t+k*0.06);
      g.gain.exponentialRampToValueAtTime(0.16,t+k*0.06+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+k*0.06+0.3);
      o.connect(g).connect(actx.destination); o.start(t+k*0.06); o.stop(t+k*0.06+0.32);
    });
  }
  function sceneSfx(n){
    if(!soundOn||!actx) return;
    if(n===1||n===6){ heartbeat(); }
    else if(n===2){ noiseBurst(1.6,'bandpass',520,0.7,0.16); setTimeout(sparkle,500); }
    else if(n===3){ noiseBurst(0.9,'lowpass',1200,1,0.22); setTimeout(heartbeat,120); }
    else if(n===4){ noiseBurst(1.0,'highpass',900,0.8,0.10); }
    else if(n===5){ sparkle(); }
  }
  function startBeatLoop(){
    if(reduceMotion||beatTimer) return;
    beatTimer = setInterval(function(){ if(soundOn && document.visibilityState==='visible') heartbeat(); }, 1000);
  }

  /* ---------- Narration ---------- */
  function narrate(){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    if(!soundOn) return;
    var u = new SpeechSynthesisUtterance(SCENES[cur-1].title + ". " + SCENES[cur-1].story);
    u.rate = 0.98; u.pitch = 1.04; u.lang='en-US';
    var voices = window.speechSynthesis.getVoices();
    var pref = voices.filter(function(v){return /en[-_]US/i.test(v.lang);});
    var nice = pref.find(function(v){return /Samantha|Google US|Jenny|Aria|Natural|Female/i.test(v.name);});
    if(nice) u.voice = nice; else if(pref[0]) u.voice = pref[0];
    window.speechSynthesis.speak(u);
  }

  /* ---------- Scene control ---------- */
  function render(){
    figures.forEach(function(f){ f.classList.toggle('is-active', +f.dataset.scene===cur); });
    var s = SCENES[cur-1];
    $('kicker').textContent = s.kicker;
    $('title').textContent = s.title;
    $('story').textContent = s.story;
    $('sci').textContent = s.sci;
    $('counter').textContent = cur + ' / ' + TOTAL;
    $('o2fill').style.width = s.o2 + '%';
    $('o2fill').style.background = s.o2 >= 60
      ? 'linear-gradient(90deg,#2fe6d6,#7ffcef)'
      : 'linear-gradient(90deg,#7b6bb0,#9a86d6)';
    $('o2fill').style.boxShadow = s.o2 >= 60 ? '0 0 12px #2fe6d6' : '0 0 12px #9a86d6';
    dots.forEach(function(d,k){
      d.classList.toggle('active', k+1===cur);
      d.classList.toggle('done', k+1<cur);
    });
    $('prev').disabled = cur===1;
    // refresh caption entrance
    var cap = $('caption'); cap.style.opacity=0; cap.style.transform='translateY(14px)';
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ cap.style.opacity=1; cap.style.transform='translateY(0)'; }); });
  }
  function go(n){
    n = Math.max(1, Math.min(TOTAL, n));
    var changed = n!==cur; cur = n;
    render();
    if(started){ sceneSfx(cur); narrate(); }
    if(cur===TOTAL){ $('next').textContent='↻ Read again'; }
    else { $('next').textContent='Next ›'; }
  }

  /* ---------- events ---------- */
  $('next').addEventListener('click', function(){ if(cur===TOTAL) go(1); else go(cur+1); });
  $('prev').addEventListener('click', function(){ go(cur-1); });
  $('narrate').addEventListener('click', function(){ if(!soundOn){ soundOn=true; updateSoundBtn(); } narrate(); });
  $('sound').addEventListener('click', function(){
    soundOn = !soundOn; updateSoundBtn();
    if(!soundOn && 'speechSynthesis' in window) window.speechSynthesis.cancel();
  });
  function updateSoundBtn(){
    var b=$('sound'); b.setAttribute('aria-pressed', soundOn);
    b.textContent = soundOn ? '♪ Sound: On' : '♪ Sound: Off';
  }
  document.addEventListener('keydown', function(e){
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); if(cur===TOTAL) go(1); else go(cur+1); }
    else if(e.key==='ArrowLeft'){ go(cur-1); }
  });
  // touch swipe
  var tx=0;
  document.addEventListener('touchstart', function(e){ tx=e.changedTouches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dx=e.changedTouches[0].clientX - tx;
    if(dx<-50){ if(cur===TOTAL) go(1); else go(cur+1); } else if(dx>50){ go(cur-1); }
  }, {passive:true});

  function begin(){
    started = true;
    initAudio();
    if(actx && actx.state==='suspended') actx.resume();
    $('cover').classList.add('hide');
    startBeatLoop();
    go(1);
  }
  $('start').addEventListener('click', begin);

  // allow deep-link to a scene for review: ?scene=3  (&nocover to skip cover)
  (function(){
    var p = new URLSearchParams(location.search);
    var s = parseInt(p.get('scene'),10);
    if(p.has('nocover')){ $('cover').classList.add('hide'); started=true; startBeatLoop(); }
    if(s>=1 && s<=TOTAL){ cur=s; }
    render();
  })();

  // voices load async in some browsers
  if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = function(){}; }
})();
</script>
</body>
